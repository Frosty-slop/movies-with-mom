[build]
  functions = "netlify/functions"

[[redirects]]
  from = "https://mom.movie/*"
  to = "https://movieswith.mom/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.mom.movie/*"
  to = "https://movieswith.mom/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.movieswith.mom/*"
  to = "https://movieswith.mom/:splat"
  status = 301
  force = true

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, GET, OPTIONS"
